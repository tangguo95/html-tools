<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        @media (min-width: 1200px) {
            body {
                padding: 20px 40px;
            }
            .container {
                max-width: 100%;
                padding: 0;
            }
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 600;
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab-btn {
            padding: 10px 20px;
            border: 1px solid #ddd;
            background: #fff;
            color: #666;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .tab-btn:hover {
            background: #fafafa;
            border-color: #ccc;
        }
        .tab-btn.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }
        .tool-panel {
            display: none;
            background: #fff;
            border-radius: 8px;
            padding: 30px;
            border: 1px solid #e0e0e0;
        }
        .tool-panel.active {
            display: block;
        }
        .tool-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"], input[type="number"], input[type="password"], textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
            background: #fff;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #999;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
        }
        .btn {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .btn-primary {
            background: #333;
            color: #fff;
            border-color: #333;
        }
        .btn-primary:hover {
            background: #555;
            border-color: #555;
        }
        .btn-secondary {
            background: #fff;
            color: #333;
        }
        .btn-secondary:hover {
            background: #f5f5f5;
        }
        .result-box {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            word-break: break-all;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            min-height: 60px;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 15px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        .diff-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .diff-container {
                grid-template-columns: 1fr;
            }
        }
        .diff-result {
            padding: 15px;
            background: #fafafa;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            max-height: 400px;
            overflow: auto;
        }
        .diff-add {
            background-color: #e6ffed;
            color: #22863a;
        }
        .diff-remove {
            background-color: #ffeef0;
            color: #cb2431;
        }
        .diff-line {
            padding: 2px 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .strength-meter {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            transition: width 0.3s, background 0.3s;
        }
        .copy-btn {
            position: relative;
        }
        .copy-btn.copied::after {
            content: '已复制!';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .alert-warning {
            background: #fffbeb;
            color: #92400e;
            border: 1px solid #fde68a;
        }
        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .alert.show {
            display: block;
        }
        .helper-text {
            margin-top: 8px;
            color: #777;
            font-size: 13px;
            line-height: 1.6;
        }
        .stats-text {
            margin-top: 12px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>工具箱</h1>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="password">密码生成器</button>
            <button class="tab-btn" data-tab="diff">文本比对</button>
            <button class="tab-btn" data-tab="json">JSON格式化</button>
            <button class="tab-btn" data-tab="base64">Base64编码</button>
            <button class="tab-btn" data-tab="md5">MD5加密</button>
            <button class="tab-btn" data-tab="aes">AES加密</button>
            <button class="tab-btn" data-tab="file-base64">文件Base64</button>
            <button class="tab-btn" data-tab="url">URL编解码</button>
            <button class="tab-btn" data-tab="sql-in">SQL IN助手</button>
            <button class="tab-btn" data-tab="timestamp">时间戳转换</button>
            <button class="tab-btn" data-tab="regex">正则测试</button>
        </div>

        <!-- 密码生成器 -->
        <div class="tool-panel active" id="password-panel">
            <h2 class="tool-title">密码生成器</h2>
            <div class="form-group">
                <label>密码长度</label>
                <input type="number" id="pwd-length" value="16" min="4" max="128">
            </div>
            <div class="form-group">
                <label>包含字符类型</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="pwd-upper" checked> 大写字母 (A-Z)</label>
                    <label><input type="checkbox" id="pwd-lower" checked> 小写字母 (a-z)</label>
                    <label><input type="checkbox" id="pwd-number" checked> 数字 (0-9)</label>
                    <label><input type="checkbox" id="pwd-symbol" checked> 特殊符号 (!@#$%...)</label>
                </div>
            </div>
            <div class="form-group">
                <label>排除相似字符</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="pwd-exclude-similar"> 排除 (0O, 1lI)</label>
                    <label><input type="checkbox" id="pwd-exclude-ambiguous"> 排除易混淆符号 ({}[]()/\'"`~,;:.<>)</label>
                </div>
            </div>
            <div class="form-group">
                <label>生成数量</label>
                <input type="number" id="pwd-count" value="5" min="1" max="20">
            </div>
            <button class="btn btn-primary" onclick="generatePasswords()">生成密码</button>
            <button class="btn btn-secondary" onclick="copyAllPasswords()">复制全部</button>
            <div id="pwd-result" class="result-box"></div>
            <div class="strength-meter">
                <div id="pwd-strength" class="strength-bar"></div>
            </div>
            <p id="pwd-strength-text" style="margin-top: 8px; color: #666;"></p>
        </div>

        <!-- 文本比对工具 -->
        <div class="tool-panel" id="diff-panel">
            <h2 class="tool-title">文本比对工具</h2>
            <div class="diff-container">
                <div class="form-group">
                    <label>原始文本</label>
                    <textarea id="diff-text1" placeholder="请输入原始文本..."></textarea>
                </div>
                <div class="form-group">
                    <label>对比文本</label>
                    <textarea id="diff-text2" placeholder="请输入对比文本..."></textarea>
                </div>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="diff-ignore-case"> 忽略大小写</label>
                    <label><input type="checkbox" id="diff-ignore-space"> 忽略空白字符</label>
                    <label><input type="checkbox" id="diff-trim-lines"> 去除行首尾空格</label>
                </div>
            </div>
            <button class="btn btn-primary" onclick="compareText()">开始比对</button>
            <button class="btn btn-secondary" onclick="swapTexts()">交换文本</button>
            <button class="btn btn-secondary" onclick="clearDiff()">清空</button>
            <div id="diff-stats" style="margin-top: 15px; color: #666;"></div>
            <div id="diff-result" class="diff-result" style="margin-top: 15px; display: none;"></div>
        </div>

        <!-- JSON格式化工具 -->
        <div class="tool-panel" id="json-panel">
            <h2 class="tool-title">JSON格式化工具</h2>
            <div class="form-group">
                <label>输入JSON</label>
                <textarea id="json-input" placeholder='请输入JSON字符串，例如: {"name": "test", "value": 123}'></textarea>
            </div>
            <div class="form-group">
                <label>缩进空格数</label>
                <select id="json-indent">
                    <option value="2">2个空格</option>
                    <option value="4" selected>4个空格</option>
                    <option value="tab">Tab缩进</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="formatJSON()">格式化</button>
            <button class="btn btn-secondary" onclick="compressJSON()">压缩</button>
            <button class="btn btn-secondary" onclick="validateJSON()">验证</button>
            <button class="btn btn-secondary copy-btn" onclick="copyResult('json-output', this)">复制结果</button>
            <div class="form-group" style="margin-top: 20px;">
                <label>输出结果</label>
                <textarea id="json-output" readonly placeholder="格式化结果将显示在这里..."></textarea>
            </div>
            <div id="json-error" class="alert alert-error"></div>
        </div>

        <!-- Base64编码 -->
        <div class="tool-panel" id="base64-panel">
            <h2 class="tool-title">Base64编码/解码</h2>
            <div class="form-group">
                <label>输入文本</label>
                <textarea id="base64-input" placeholder="请输入要编码或解码的文本..."></textarea>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="base64-url-safe"> URL安全模式 (替换 +/ 为 -_)</label>
                    <label><input type="checkbox" id="base64-no-padding"> 去除填充字符 (=)</label>
                </div>
            </div>
            <button class="btn btn-primary" onclick="base64Encode()">编码</button>
            <button class="btn btn-primary" onclick="base64Decode()">解码</button>
            <button class="btn btn-secondary copy-btn" onclick="copyResult('base64-output', this)">复制结果</button>
            <div class="form-group" style="margin-top: 20px;">
                <label>输出结果</label>
                <textarea id="base64-output" readonly placeholder="结果将显示在这里..."></textarea>
            </div>
            <div id="base64-error" class="alert alert-error"></div>
        </div>

        <!-- MD5加密 -->
        <div class="tool-panel" id="md5-panel">
            <h2 class="tool-title">MD5加密</h2>
            <div class="form-group">
                <label>输入文本</label>
                <textarea id="md5-input" placeholder="请输入要加密的文本..."></textarea>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="md5-uppercase"> 大写输出</label>
                    <label><input type="checkbox" id="md5-16bit"> 16位MD5 (取中间16位)</label>
                </div>
            </div>
            <button class="btn btn-primary" onclick="generateMD5()">生成MD5</button>
            <button class="btn btn-secondary copy-btn" onclick="copyResult('md5-output', this)">复制结果</button>
            <div class="form-group" style="margin-top: 20px;">
                <label>MD5结果</label>
                <input type="text" id="md5-output" readonly placeholder="MD5结果将显示在这里...">
            </div>
        </div>

        <!-- AES加密 -->
        <div class="tool-panel" id="aes-panel">
            <h2 class="tool-title">AES加密/解密</h2>
            <div id="aes-warning" class="alert alert-warning">
                注意：此功能使用Web Crypto API，需要浏览器支持。如果您看到此消息，请确保使用现代浏览器。
            </div>
            <div class="form-group">
                <label>输入文本</label>
                <textarea id="aes-input" placeholder="请输入要加密或解密的文本..."></textarea>
            </div>
            <div class="form-group">
                <label>密钥 (建议16/24/32字符对应AES-128/192/256)</label>
                <input type="password" id="aes-key" placeholder="请输入密钥...">
                <button class="btn btn-secondary" style="margin-top: 10px;" onclick="toggleKeyVisibility()">显示/隐藏密钥</button>
                <button class="btn btn-secondary" style="margin-top: 10px;" onclick="generateAESKey()">生成随机密钥</button>
            </div>
            <div class="form-group">
                <label>加密模式</label>
                <select id="aes-mode">
                    <option value="GCM" selected>AES-GCM (推荐，带认证)</option>
                    <option value="CBC">AES-CBC</option>
                    <option value="CTR">AES-CTR</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="aesEncrypt()">加密</button>
            <button class="btn btn-primary" onclick="aesDecrypt()">解密</button>
            <button class="btn btn-secondary copy-btn" onclick="copyResult('aes-output', this)">复制结果</button>
            <div class="form-group" style="margin-top: 20px;">
                <label>输出结果</label>
                <textarea id="aes-output" readonly placeholder="结果将显示在这里..."></textarea>
            </div>
            <div id="aes-error" class="alert alert-error"></div>
        </div>

        <!-- 文件Base64转换 -->
        <div class="tool-panel" id="file-base64-panel">
            <h2 class="tool-title">文件Base64转换</h2>
            <div class="form-group">
                <label>文件转Base64</label>
                <input type="file" id="file-to-base64-input" style="padding: 8px 0;">
                <button class="btn btn-primary" style="margin-top: 10px;" onclick="fileToBase64()">转换为Base64</button>
            </div>
            <div class="form-group">
                <label>输出Base64</label>
                <textarea id="file-base64-output" readonly placeholder="文件的Base64编码将显示在这里..."></textarea>
                <button class="btn btn-secondary copy-btn" style="margin-top: 10px;" onclick="copyResult('file-base64-output', this)">复制</button>
            </div>
            <hr style="margin: 30px 0; border: none; border-top: 1px solid #eee;">
            <div class="form-group">
                <label>Base64转文件</label>
                <textarea id="base64-to-file-input" placeholder="请输入Base64编码..."></textarea>
            </div>
            <div class="form-group">
                <label>文件名</label>
                <input type="text" id="base64-filename" placeholder="例如: image.png">
            </div>
            <button class="btn btn-primary" onclick="base64ToFile()">下载文件</button>
            <div id="file-base64-error" class="alert alert-error"></div>
        </div>

        <!-- URL编解码 -->
        <div class="tool-panel" id="url-panel">
            <h2 class="tool-title">URL编码/解码</h2>
            <div class="form-group">
                <label>输入内容</label>
                <textarea id="url-input" placeholder="请输入要编码或解码的内容..."></textarea>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="url-component" checked> 使用encodeURIComponent (编码所有特殊字符)</label>
                </div>
            </div>
            <button class="btn btn-primary" onclick="urlEncode()">编码</button>
            <button class="btn btn-primary" onclick="urlDecode()">解码</button>
            <button class="btn btn-secondary copy-btn" onclick="copyResult('url-output', this)">复制结果</button>
            <div class="form-group" style="margin-top: 20px;">
                <label>输出结果</label>
                <textarea id="url-output" readonly placeholder="结果将显示在这里..."></textarea>
            </div>
            <div id="url-error" class="alert alert-error"></div>
        </div>

        <!-- SQL IN助手 -->
        <div class="tool-panel" id="sql-in-panel">
            <h2 class="tool-title">SQL IN助手</h2>
            <div class="form-group">
                <label>粘贴原始数据</label>
                <textarea id="sql-in-input" placeholder="可直接粘贴 Excel 中复制的内容，支持多行多列..."></textarea>
                <p class="helper-text">会自动按换行、制表符拆分，忽略空值，并对单引号进行 SQL 转义。</p>
            </div>
            <div class="form-group">
                <label>输出格式</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="sql-in-quote" checked> 单引号包裹</label>
                    <label><input type="checkbox" id="sql-in-distinct" checked> 去重</label>
                    <label><input type="checkbox" id="sql-in-trim" checked> 去除首尾空格</label>
                    <label><input type="checkbox" id="sql-in-wrap"> 包含外层括号</label>
                </div>
            </div>
            <button class="btn btn-primary" onclick="convertSqlIn()">转换</button>
            <button class="btn btn-secondary" onclick="clearSqlIn()">清空</button>
            <button class="btn btn-secondary copy-btn" onclick="copyResult('sql-in-output', this)">复制结果</button>
            <div id="sql-in-stats" class="stats-text"></div>
            <div class="form-group" style="margin-top: 20px;">
                <label>输出结果</label>
                <textarea id="sql-in-output" readonly placeholder="例如: '1001','1002','1003'"></textarea>
            </div>
        </div>
        <!-- 时间戳转换 -->
        <div class="tool-panel" id="timestamp-panel">
            <h2 class="tool-title">时间戳转换器</h2>
            <div class="form-group">
                <label>当前时间戳</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="ts-current" readonly placeholder="点击获取当前时间戳">
                    <button class="btn btn-primary" onclick="refreshTimestamp()">刷新</button>
                    <button class="btn btn-secondary copy-btn" onclick="copyResult('ts-current', this)">复制</button>
                </div>
            </div>
            <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">
            <div class="form-group">
                <label>时间戳转日期</label>
                <input type="text" id="ts-to-date-input" placeholder="输入Unix时间戳（秒或毫秒）">
                <p class="helper-text">支持秒级(10位)和毫秒级(13位)时间戳</p>
            </div>
            <button class="btn btn-primary" onclick="timestampToDate()">转换为日期</button>
            <div class="form-group" style="margin-top: 15px;">
                <label>转换结果</label>
                <div id="ts-date-result" class="result-box" style="font-family: monospace;">
                    <div id="ts-local"></div>
                    <div id="ts-utc" style="color: #666; font-size: 13px; margin-top: 8px;"></div>
                    <div id="ts-relative" style="color: #888; font-size: 13px; margin-top: 8px;"></div>
                </div>
            </div>
            <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">
            <div class="form-group">
                <label>日期转时间戳</label>
                <input type="datetime-local" id="date-to-ts-input" style="width: 100%;">
            </div>
            <div class="form-group">
                <label>时区</label>
                <select id="ts-timezone">
                    <option value="local">本地时区</option>
                    <option value="UTC">UTC</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="dateToTimestamp()">转换为时间戳</button>
            <div class="form-group" style="margin-top: 15px;">
                <label>时间戳结果</label>
                <div class="result-box">
                    <div>秒级: <span id="ts-seconds" style="font-family: monospace; cursor: pointer;" onclick="copyToClipboard(this.textContent, this)" title="点击复制"></span></div>
                    <div style="margin-top: 8px;">毫秒级: <span id="ts-milliseconds" style="font-family: monospace; cursor: pointer;" onclick="copyToClipboard(this.textContent, this)" title="点击复制"></span></div>
                </div>
            </div>
            <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">
            <div class="form-group">
                <label>多时区显示</label>
                <input type="datetime-local" id="tz-input" style="width: 100%;">
                <p class="helper-text">输入时间后显示全球主要时区</p>
            </div>
            <button class="btn btn-primary" onclick="showAllTimezones()">显示时区</button>
            <div id="tz-result" style="margin-top: 15px; font-family: monospace; font-size: 14px;"></div>
        </div>

        <!-- 正则表达式测试 -->
        <div class="tool-panel" id="regex-panel">
            <h2 class="tool-title">正则表达式测试</h2>
            <div class="form-group">
                <label>正则表达式</label>
                <div style="display: flex; gap: 10px;">
                    <span style="padding: 10px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px 0 0 6px; border-right: none; color: #666;">/</span>
                    <input type="text" id="regex-pattern" placeholder="输入正则表达式，如: \d+" style="border-radius: 0; flex: 1;">
                    <span style="padding: 10px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 0 6px 6px 0; border-left: none; color: #666;">/</span>
                </div>
            </div>
            <div class="form-group">

        // ==================== 密码生成器 ====================
        function generatePasswords() {
            const length = parseInt(document.getElementById('pwd-length').value);
            const count = parseInt(document.getElementById('pwd-count').value);
            const includeUpper = document.getElementById('pwd-upper').checked;
            const includeLower = document.getElementById('pwd-lower').checked;
            const includeNumber = document.getElementById('pwd-number').checked;
            const includeSymbol = document.getElementById('pwd-symbol').checked;
            const excludeSimilar = document.getElementById('pwd-exclude-similar').checked;
            const excludeAmbiguous = document.getElementById('pwd-exclude-ambiguous').checked;

            let chars = '';
            let upperChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let lowerChars = 'abcdefghijklmnopqrstuvwxyz';
            let numberChars = '0123456789';
            let symbolChars = '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (excludeSimilar) {
                upperChars = upperChars.replace(/[OI]/g, '');
                lowerChars = lowerChars.replace(/[l]/g, '');
                numberChars = numberChars.replace(/[01]/g, '');
            }

            if (excludeAmbiguous) {
                symbolChars = '!@#$%^&*_+-=';
            }

            if (includeUpper) chars += upperChars;
            if (includeLower) chars += lowerChars;
            if (includeNumber) chars += numberChars;
            if (includeSymbol) chars += symbolChars;

            if (!chars) {
                alert('请至少选择一种字符类型！');
                return;
            }

            const passwords = [];
            for (let i = 0; i < count; i++) {
                let password = '';
                const array = new Uint32Array(length);
                crypto.getRandomValues(array);
                for (let j = 0; j < length; j++) {
                    password += chars[array[j] % chars.length];
                }
                passwords.push(password);
            }

            const resultBox = document.getElementById('pwd-result');
            resultBox.innerHTML = passwords.map((p, i) => 
                `<div style="padding: 8px 0; border-bottom: 1px solid #eee;">
                    <span style="color: #999; margin-right: 10px;">${i + 1}.</span>
                    <span style="font-family: monospace;">${p}</span>
                    <button class="btn btn-secondary copy-btn" style="float: right; padding: 4px 12px; margin: 0;" 
                        onclick="copyToClipboard('${p}', this)">复制</button>
                </div>`
            ).join('');

            // 计算密码强度
            calculateStrength(passwords[0], chars.length);
        }

        function calculateStrength(password, charsetSize) {
            const entropy = password.length * Math.log2(charsetSize);
            const strengthBar = document.getElementById('pwd-strength');
            const strengthText = document.getElementById('pwd-strength-text');
            
            let strength, color, text;
            if (entropy < 28) {
                strength = 20; color = '#dc3545'; text = '非常弱';
            } else if (entropy < 36) {
                strength = 40; color = '#fd7e14'; text = '弱';
            } else if (entropy < 60) {
                strength = 60; color = '#ffc107'; text = '中等';
            } else if (entropy < 80) {
                strength = 80; color = '#28a745'; text = '强';
            } else {
                strength = 100; color = '#20c997'; text = '非常强';
            }

            strengthBar.style.width = strength + '%';
            strengthBar.style.background = color;
            strengthText.innerHTML = `密码强度: <strong style="color: ${color}">${text}</strong> (熵值: ${entropy.toFixed(1)} bits)`;
        }

        // ==================== 文本比对工具 ====================
        function compareText() {
            let text1 = document.getElementById('diff-text1').value;
            let text2 = document.getElementById('diff-text2').value;
            const ignoreCase = document.getElementById('diff-ignore-case').checked;
            const ignoreSpace = document.getElementById('diff-ignore-space').checked;
            const trimLines = document.getElementById('diff-trim-lines').checked;

            let lines1 = text1.split('\n');
            let lines2 = text2.split('\n');

            if (trimLines) {
                lines1 = lines1.map(l => l.trim());
                lines2 = lines2.map(l => l.trim());
            }

            // 使用最长公共子序列算法进行比对
            const diff = computeDiff(lines1, lines2, ignoreCase, ignoreSpace);
            
            let addCount = 0, removeCount = 0, unchangedCount = 0;
            let html = '';

            diff.forEach(item => {
                const escapedLine = escapeHtml(item.line);
                if (item.type === 'add') {
                    html += `<div class="diff-line diff-add">+ ${escapedLine}</div>`;
                    addCount++;
                } else if (item.type === 'remove') {
                    html += `<div class="diff-line diff-remove">- ${escapedLine}</div>`;
                    removeCount++;
                } else {
                    html += `<div class="diff-line">  ${escapedLine}</div>`;
                    unchangedCount++;
                }
            });

            document.getElementById('diff-stats').innerHTML = 
                `<span style="color: #155724;">+${addCount} 新增</span> | 
                 <span style="color: #721c24;">-${removeCount} 删除</span> | 
                 <span style="color: #666;">${unchangedCount} 未变</span>`;

            const resultDiv = document.getElementById('diff-result');
            resultDiv.innerHTML = html || '<div style="color: #666; padding: 20px; text-align: center;">两个文本完全相同</div>';
            resultDiv.style.display = 'block';
        }

        function computeDiff(lines1, lines2, ignoreCase, ignoreSpace) {
            const normalize = (str) => {
                let s = str;
                if (ignoreCase) s = s.toLowerCase();
                if (ignoreSpace) s = s.replace(/\s+/g, '');
                return s;
            };

            // LCS算法
            const m = lines1.length, n = lines2.length;
            const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));

            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (normalize(lines1[i-1]) === normalize(lines2[j-1])) {
                        dp[i][j] = dp[i-1][j-1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
                    }
                }
            }

            // 回溯生成diff
            const result = [];
            let i = m, j = n;
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && normalize(lines1[i-1]) === normalize(lines2[j-1])) {
                    result.unshift({ type: 'same', line: lines1[i-1] });
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
                    result.unshift({ type: 'add', line: lines2[j-1] });
                    j--;
                } else {
                    result.unshift({ type: 'remove', line: lines1[i-1] });
                    i--;
                }
            }
            return result;
        }

        // ==================== Base64编码 ====================
        function base64Encode() {

            const noPadding = document.getElementById('base64-no-padding').checked;
            const errorDiv = document.getElementById('base64-error');
            
            try {

                const encoder = new TextEncoder();
                const data = encoder.encode(input);

                    base64 = base64.replace(/\+/g, '-').replace(/\//g, '_');

                    base64 = base64.replace(/=+$/, '');

        function base64Decode() {
            let input = document.getElementById('base64-input').value;
            const urlSafe = document.getElementById('base64-url-safe').checked;
            const errorDiv = document.getElementById('base64-error');
            
            try {
                if (urlSafe) {
                    input = input.replace(/-/g, '+').replace(/_/g, '/');
                }
                // 补充padding
                while (input.length % 4) {
                    input += '=';
                }
                
                const binaryStr = atob(input);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                }
                const decoder = new TextDecoder();
                document.getElementById('base64-output').value = decoder.decode(bytes);
                errorDiv.classList.remove('show');
            } catch (e) {
                errorDiv.textContent = '解码错误: ' + e.message;
                errorDiv.classList.add('show');
            }
        }

        // ==================== MD5加密 (纯JS实现) ====================
        function generateMD5() {
            const input = document.getElementById('md5-input').value;
            const uppercase = document.getElementById('md5-uppercase').checked;
            const is16bit = document.getElementById('md5-16bit').checked;
            
            let hash = md5(input);
            if (is16bit) {
                hash = hash.substring(8, 24);
            }
            if (uppercase) {
                hash = hash.toUpperCase();
            }
            
            document.getElementById('md5-output').value = hash;
        }

        // MD5算法纯JS实现
        function md5(string) {
            function rotateLeft(value, shift) {
                return (value << shift) | (value >>> (32 - shift));
            }

            function addUnsigned(x, y) {
                const x8 = x & 0x80000000;
                const y8 = y & 0x80000000;
                const x4 = x & 0x40000000;
                const y4 = y & 0x40000000;
                const result = (x & 0x3FFFFFFF) + (y & 0x3FFFFFFF);
                if (x4 & y4) return result ^ 0x80000000 ^ x8 ^ y8;
                if (x4 | y4) {
                    if (result & 0x40000000) return result ^ 0xC0000000 ^ x8 ^ y8;
                    else return result ^ 0x40000000 ^ x8 ^ y8;
                } else {
                    return result ^ x8 ^ y8;
                }
            }

            function F(x, y, z) { return (x & y) | ((~x) & z); }
            function G(x, y, z) { return (x & z) | (y & (~z)); }
            function H(x, y, z) { return x ^ y ^ z; }
            function I(x, y, z) { return y ^ (x | (~z)); }

            function FF(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(F(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function GG(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(G(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function HH(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(H(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function II(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(I(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }

            function convertToWordArray(string) {
                const utf8 = unescape(encodeURIComponent(string));
                const length = utf8.length;
                const wordCount = ((length + 8) >>> 6) + 1;
                const words = new Array(wordCount * 16).fill(0);
                
                for (let i = 0; i < length; i++) {
                    words[i >>> 2] |= utf8.charCodeAt(i) << ((i % 4) * 8);
                }
                words[length >>> 2] |= 0x80 << ((length % 4) * 8);
                words[wordCount * 16 - 2] = length * 8;
                return words;
            }

            function wordToHex(value) {
                let hex = '';
                for (let i = 0; i <= 3; i++) {
                    const byte = (value >>> (i * 8)) & 255;
                    hex += ('0' + byte.toString(16)).slice(-2);
                }
                return hex;
            }

            const x = convertToWordArray(string);
            let a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;

            const S = [7, 12, 17, 22, 5, 9, 14, 20, 4, 11, 16, 23, 6, 10, 15, 21];
            const T = [];
            for (let i = 1; i <= 64; i++) {
                T[i] = Math.floor(Math.abs(Math.sin(i)) * 0x100000000);
            }

            for (let k = 0; k < x.length; k += 16) {
                const AA = a, BB = b, CC = c, DD = d;

                a = FF(a, b, c, d, x[k+0], S[0], T[1]);
                d = FF(d, a, b, c, x[k+1], S[1], T[2]);
                c = FF(c, d, a, b, x[k+2], S[2], T[3]);
                b = FF(b, c, d, a, x[k+3], S[3], T[4]);
                a = FF(a, b, c, d, x[k+4], S[0], T[5]);
                d = FF(d, a, b, c, x[k+5], S[1], T[6]);
                c = FF(c, d, a, b, x[k+6], S[2], T[7]);
                b = FF(b, c, d, a, x[k+7], S[3], T[8]);
                a = FF(a, b, c, d, x[k+8], S[0], T[9]);
                d = FF(d, a, b, c, x[k+9], S[1], T[10]);
                c = FF(c, d, a, b, x[k+10], S[2], T[11]);
                b = FF(b, c, d, a, x[k+11], S[3], T[12]);
                a = FF(a, b, c, d, x[k+12], S[0], T[13]);
                d = FF(d, a, b, c, x[k+13], S[1], T[14]);
                c = FF(c, d, a, b, x[k+14], S[2], T[15]);
                b = FF(b, c, d, a, x[k+15], S[3], T[16]);

                a = GG(a, b, c, d, x[k+1], S[4], T[17]);
                d = GG(d, a, b, c, x[k+6], S[5], T[18]);
                c = GG(c, d, a, b, x[k+11], S[6], T[19]);
                b = GG(b, c, d, a, x[k+0], S[7], T[20]);
                a = GG(a, b, c, d, x[k+5], S[4], T[21]);
                d = GG(d, a, b, c, x[k+10], S[5], T[22]);
                c = GG(c, d, a, b, x[k+15], S[6], T[23]);
                b = GG(b, c, d, a, x[k+4], S[7], T[24]);
                a = GG(a, b, c, d, x[k+9], S[4], T[25]);
                d = GG(d, a, b, c, x[k+14], S[5], T[26]);
                c = GG(c, d, a, b, x[k+3], S[6], T[27]);
                b = GG(b, c, d, a, x[k+8], S[7], T[28]);
                a = GG(a, b, c, d, x[k+13], S[4], T[29]);
                d = GG(d, a, b, c, x[k+2], S[5], T[30]);
                c = GG(c, d, a, b, x[k+7], S[6], T[31]);
                b = GG(b, c, d, a, x[k+12], S[7], T[32]);

                a = HH(a, b, c, d, x[k+5], S[8], T[33]);
                d = HH(d, a, b, c, x[k+8], S[9], T[34]);
                c = HH(c, d, a, b, x[k+11], S[10], T[35]);
                b = HH(b, c, d, a, x[k+14], S[11], T[36]);
                a = HH(a, b, c, d, x[k+1], S[8], T[37]);
                d = HH(d, a, b, c, x[k+4], S[9], T[38]);
                c = HH(c, d, a, b, x[k+7], S[10], T[39]);
                b = HH(b, c, d, a, x[k+10], S[11], T[40]);
                a = HH(a, b, c, d, x[k+13], S[8], T[41]);
                d = HH(d, a, b, c, x[k+0], S[9], T[42]);
                c = HH(c, d, a, b, x[k+3], S[10], T[43]);
                b = HH(b, c, d, a, x[k+6], S[11], T[44]);
                a = HH(a, b, c, d, x[k+9], S[8], T[45]);
                d = HH(d, a, b, c, x[k+12], S[9], T[46]);
                c = HH(c, d, a, b, x[k+15], S[10], T[47]);
                b = HH(b, c, d, a, x[k+2], S[11], T[48]);

                a = II(a, b, c, d, x[k+0], S[12], T[49]);
                d = II(d, a, b, c, x[k+7], S[13], T[50]);
                c = II(c, d, a, b, x[k+14], S[14], T[51]);
                b = II(b, c, d, a, x[k+5], S[15], T[52]);
                a = II(a, b, c, d, x[k+12], S[12], T[53]);
                d = II(d, a, b, c, x[k+3], S[13], T[54]);
                c = II(c, d, a, b, x[k+10], S[14], T[55]);
                b = II(b, c, d, a, x[k+1], S[15], T[56]);
                a = II(a, b, c, d, x[k+8], S[12], T[57]);
                d = II(d, a, b, c, x[k+15], S[13], T[58]);
                c = II(c, d, a, b, x[k+6], S[14], T[59]);
                b = II(b, c, d, a, x[k+13], S[15], T[60]);
                a = II(a, b, c, d, x[k+4], S[12], T[61]);
                d = II(d, a, b, c, x[k+11], S[13], T[62]);
                c = II(c, d, a, b, x[k+2], S[14], T[63]);
                b = II(b, c, d, a, x[k+9], S[15], T[64]);

                a = addUnsigned(a, AA);
                b = addUnsigned(b, BB);
                c = addUnsigned(c, CC);
                d = addUnsigned(d, DD);
            }

            return wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d);
        }

        // ==================== AES加密 (使用Web Crypto API) ====================
        // 检查Web Crypto API支持
        if (!window.crypto || !window.crypto.subtle) {
            document.getElementById('aes-warning').classList.add('show');
        }

        async function deriveKey(password, salt, mode) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                enc.encode(password),
                'PBKDF2',
                false,
                ['deriveBits', 'deriveKey']
            );
            
            return crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-' + mode, length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }

        async function aesEncrypt() {
            const input = document.getElementById('aes-input').value;
            const password = document.getElementById('aes-key').value;
            const mode = document.getElementById('aes-mode').value;
            const errorDiv = document.getElementById('aes-error');

            if (!password) {
                errorDiv.textContent = '请输入密钥！';
                errorDiv.classList.add('show');
                return;
            }

            if (!window.crypto || !window.crypto.subtle) {
                errorDiv.textContent = '您的浏览器不支持Web Crypto API，无法使用AES加密功能！';
                errorDiv.classList.add('show');
                return;
            }

            try {
                const enc = new TextEncoder();
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(mode === 'GCM' ? 12 : 16));
                
                const key = await deriveKey(password, salt, mode);
                
                let algorithm;
                if (mode === 'GCM') {
                    algorithm = { name: 'AES-GCM', iv: iv };
                } else if (mode === 'CBC') {
                    algorithm = { name: 'AES-CBC', iv: iv };
                } else {
                    algorithm = { name: 'AES-CTR', counter: iv, length: 64 };
                }

                const encrypted = await crypto.subtle.encrypt(
                    algorithm,
                    key,
                    enc.encode(input)
                );

                // 组合: salt + iv + encrypted
                const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
                combined.set(salt, 0);
                combined.set(iv, salt.length);
                combined.set(new Uint8Array(encrypted), salt.length + iv.length);

                document.getElementById('aes-output').value = btoa(String.fromCharCode(...combined));
                errorDiv.classList.remove('show');
            } catch (e) {
                errorDiv.textContent = '加密错误: ' + e.message;
                errorDiv.classList.add('show');
            }
        }

        async function aesDecrypt() {
            const input = document.getElementById('aes-input').value;
            const password = document.getElementById('aes-key').value;
            const mode = document.getElementById('aes-mode').value;
            const errorDiv = document.getElementById('aes-error');

            if (!password) {
                errorDiv.textContent = '请输入密钥！';
                errorDiv.classList.add('show');
                return;
            }

            if (!window.crypto || !window.crypto.subtle) {
                errorDiv.textContent = '您的浏览器不支持Web Crypto API，无法使用AES解密功能！';
                errorDiv.classList.add('show');
                return;
            }

            try {
                const combined = new Uint8Array(atob(input).split('').map(c => c.charCodeAt(0)));
                const ivLength = mode === 'GCM' ? 12 : 16;
                
                const salt = combined.slice(0, 16);
                const iv = combined.slice(16, 16 + ivLength);
                const encrypted = combined.slice(16 + ivLength);

                const key = await deriveKey(password, salt, mode);

                let algorithm;
                if (mode === 'GCM') {
                    algorithm = { name: 'AES-GCM', iv: iv };
                } else if (mode === 'CBC') {
                    algorithm = { name: 'AES-CBC', iv: iv };
                } else {
                    algorithm = { name: 'AES-CTR', counter: iv, length: 64 };
                }

                const decrypted = await crypto.subtle.decrypt(
                    algorithm,
                    key,
                    encrypted
                );

                const dec = new TextDecoder();
                document.getElementById('aes-output').value = dec.decode(decrypted);
                errorDiv.classList.remove('show');
            } catch (e) {
                errorDiv.textContent = '解密错误: ' + e.message + ' (请确认密钥和加密模式正确)';
                errorDiv.classList.add('show');
            }
        }

        function toggleKeyVisibility() {
            const keyInput = document.getElementById('aes-key');
            keyInput.type = keyInput.type === 'password' ? 'text' : 'password';
        }

        function generateAESKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            const array = new Uint32Array(32);
            crypto.getRandomValues(array);
            let key = '';
            for (let i = 0; i < 32; i++) {
                key += chars[array[i] % chars.length];
            }
            document.getElementById('aes-key').value = key;
            document.getElementById('aes-key').type = 'text';
        }

        // ==================== 通用工具函数 ====================
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                setTimeout(() => btn.classList.remove('copied'), 1500);
            });
        }

        function copyResult(elementId, btn) {
            const text = document.getElementById(elementId).value;
            if (text) {
                navigator.clipboard.writeText(text).then(() => {
                    btn.classList.add('copied');
                    setTimeout(() => btn.classList.remove('copied'), 1500);
                });
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 文件Base64转换 ====================
        function fileToBase64() {
            const fileInput = document.getElementById('file-to-base64-input');
            const errorDiv = document.getElementById('file-base64-error');
            
            if (!fileInput.files || !fileInput.files[0]) {
                errorDiv.textContent = '请先选择文件！';
                errorDiv.classList.add('show');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                document.getElementById('file-base64-output').value = e.target.result;
                errorDiv.classList.remove('show');
            };
            
            reader.onerror = function() {
                errorDiv.textContent = '文件读取失败！';
                errorDiv.classList.add('show');
            };
            
            reader.readAsDataURL(file);
        }

        function base64ToFile() {
            const base64Input = document.getElementById('base64-to-file-input').value.trim();
            const filename = document.getElementById('base64-filename').value.trim() || 'download';
            const errorDiv = document.getElementById('file-base64-error');
            
            if (!base64Input) {
                errorDiv.textContent = '请输入Base64编码！';
                errorDiv.classList.add('show');
                return;
            }

            try {
                let base64Data = base64Input;
                let mimeType = 'application/octet-stream';
                
                if (base64Input.includes(',')) {
                    const parts = base64Input.split(',');
                    const mimeMatch = parts[0].match(/:(.*?);/);
                    if (mimeMatch) mimeType = mimeMatch[1];
                    base64Data = parts[1];
                }
                
                const byteCharacters = atob(base64Data);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: mimeType });
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
                
                errorDiv.classList.remove('show');
            } catch (e) {
                errorDiv.textContent = 'Base64解码失败: ' + e.message;
                errorDiv.classList.add('show');
            }
        }

        // ==================== URL编解码 ====================
        function urlEncode() {
            const input = document.getElementById('url-input').value;
            const useComponent = document.getElementById('url-component').checked;
            const errorDiv = document.getElementById('url-error');
            
            try {
                const result = useComponent ? encodeURIComponent(input) : encodeURI(input);
                document.getElementById('url-output').value = result;
                errorDiv.classList.remove('show');
            } catch (e) {
                errorDiv.textContent = '编码失败: ' + e.message;
                errorDiv.classList.add('show');
            }
        }

        function urlDecode() {
            const input = document.getElementById('url-input').value;
            const useComponent = document.getElementById('url-component').checked;
            const errorDiv = document.getElementById('url-error');
            
            try {
                const result = useComponent ? decodeURIComponent(input) : decodeURI(input);
                document.getElementById('url-output').value = result;
                errorDiv.classList.remove('show');
            } catch (e) {
                errorDiv.textContent = '解码失败: ' + e.message;
                errorDiv.classList.add('show');
            }
        }

        // ==================== SQL IN助手 ====================
        function convertSqlIn() {
            const input = document.getElementById('sql-in-input').value;
            const withQuote = document.getElementById('sql-in-quote').checked;
            const distinct = document.getElementById('sql-in-distinct').checked;
            const trimValue = document.getElementById('sql-in-trim').checked;
            const wrapIn = document.getElementById('sql-in-wrap').checked;
            const output = document.getElementById('sql-in-output');
            const stats = document.getElementById('sql-in-stats');

            const rawItems = input
                .split(/\r?\n|\t/)
                .map(item => trimValue ? item.trim() : item)
                .filter(item => item !== '');

            const values = distinct ? [...new Set(rawItems)] : rawItems;

            const formatted = values.map(value => {
                const escaped = value.replace(/'/g, "''");
                return withQuote ? `'${escaped}'` : escaped;
            });

            const result = wrapIn ? `(${formatted.join(',')})` : formatted.join(',');
            output.value = result;
            stats.textContent = values.length
                ? `共解析 ${rawItems.length} 项，输出 ${values.length} 项。`
                : '未识别到可用数据。';
        }

        function clearSqlIn() {
            document.getElementById('sql-in-input').value = '';
            document.getElementById('sql-in-output').value = '';
            document.getElementById('sql-in-stats').textContent = '';
        }

        // ==================== 时间戳转换器 ====================
        function refreshTimestamp() {
            const now = Date.now();
            document.getElementById('ts-current').value = now;
        }

        // 自动刷新时间戳
        setInterval(refreshTimestamp, 1000);
        refreshTimestamp();

        function timestampToDate() {
            const input = document.getElementById('ts-to-date-input').value.trim();
            if (!input) {
                document.getElementById('ts-local').textContent = '请输入时间戳';
                document.getElementById('ts-utc').textContent = '';
                document.getElementById('ts-relative').textContent = '';
                return;
            }

            let ts = parseInt(input);
            // 自动判断秒级还是毫秒级
            if (ts < 1e12) {
                ts *= 1000; // 秒级转毫秒级
            }

            const date = new Date(ts);
            
            // 本地时间
            const localStr = date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            document.getElementById('ts-local').textContent = '本地时间: ' + localStr;

            // UTC时间
            const utcStr = date.toISOString().replace('T', ' ').replace(/\.\d{3}Z$/, '');
            document.getElementById('ts-utc').textContent = 'UTC时间: ' + utcStr;

            // 相对时间
            const now = Date.now();
            const diff = now - ts;
            const relativeStr = formatRelativeTime(diff);
            document.getElementById('ts-relative').textContent = '相对: ' + relativeStr;
        }

        function formatRelativeTime(diff) {
            const absDiff = Math.abs(diff);
            const future = diff < 0;
            
            const seconds = Math.floor(absDiff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            const months = Math.floor(days / 30);
            const years = Math.floor(days / 365);

            let str;
            if (years > 0) str = years + '年';
            else if (months > 0) str = months + '个月';
            else if (days > 0) str = days + '天';
            else if (hours > 0) str = hours + '小时';
            else if (minutes > 0) str = minutes + '分钟';
            else str = seconds + '秒';

            return future ? str + '后' : str + '前';
        }

        function dateToTimestamp() {
            const input = document.getElementById('date-to-ts-input').value;
            if (!input) {
                document.getElementById('ts-seconds').textContent = '请选择日期时间';
                document.getElementById('ts-milliseconds').textContent = '';
                return;
            }

            const timezone = document.getElementById('ts-timezone').value;
            let date;

            if (timezone === 'UTC') {
                date = new Date(input + 'Z');
            } else {
                date = new Date(input);
            }

            const ms = date.getTime();
            const seconds = Math.floor(ms / 1000);

            document.getElementById('ts-seconds').textContent = seconds;
            document.getElementById('ts-milliseconds').textContent = ms;
        }

        function showAllTimezones() {
            const input = document.getElementById('tz-input').value;
            if (!input) {
                document.getElementById('tz-result').innerHTML = '<div style="color: #999;">请选择日期时间</div>';
                return;
            }

            const date = new Date(input);
            const timezones = [
                { name: '北京 (UTC+8)', offset: 8 },
                { name: '东京 (UTC+9)', offset: 9 },
                { name: '纽约 (UTC-5)', offset: -5 },
                { name: '洛杉矶 (UTC-8)', offset: -8 },
                { name: '伦敦 (UTC+0)', offset: 0 },
                { name: '巴黎 (UTC+1)', offset: 1 },
                { name: '悉尼 (UTC+10)', offset: 10 },
                { name: '莫斯科 (UTC+3)', offset: 3 },
                { name: '新加坡 (UTC+8)', offset: 8 },
                { name: '印度 (UTC+5:30)', offset: 5.5 },
            ];

            let html = '<table style="width: 100%; border-collapse: collapse;">';
            html += '<tr style="border-bottom: 1px solid #ddd;"><th style="padding: 8px; text-align: left;">时区</th><th style="padding: 8px; text-align: right;">时间</th></tr>';

            timezones.forEach(tz => {
                const offsetMs = tz.offset * 3600000;
                const tzDate = new Date(date.getTime() + offsetMs + (date.getTimezoneOffset() * 60000));
                const timeStr = tzDate.toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
                html += '<tr style="border-bottom: 1px solid #eee;"><td style="padding: 8px;">' + tz.name + '</td><td style="padding: 8px; text-align: right;">' + timeStr + '</td></tr>';
            });

            html += '</table>';
            document.getElementById('tz-result').innerHTML = html;
        }

        // ==================== 正则表达式测试 ====================
        function testRegex() {
            const pattern = document.getElementById('regex-pattern').value;
            const input = document.getElementById('regex-input').value;
            const resultDiv = document.getElementById('regex-result');

            if (!pattern) {
                resultDiv.innerHTML = '<span style="color: #999;">请输入正则表达式</span>';
                return;
            }

            let flags = '';
            if (document.getElementById('regex-global').checked) flags += 'g';
            if (document.getElementById('regex-ignore-case').checked) flags += 'i';
            if (document.getElementById('regex-multiline').checked) flags += 'm';
            if (document.getElementById('regex-dotall').checked) flags += 's';

            try {
                const regex = new RegExp(pattern, flags);
                
                if (!input) {
                    resultDiv.innerHTML = '<span style="color: #999;">请输入测试文本</span>';
                    return;
                }

                const matches = [];
                let match;
                
                if (flags.includes('g')) {
                    while ((match = regex.exec(input)) !== null) {
                        matches.push({
                            text: match[0],
                            index: match.index,
                            groups: match.slice(1)
                        });
                        if (match.index === regex.lastIndex) {
                            regex.lastIndex++;
                        }
                    }
                } else {
                    match = regex.exec(input);
                    if (match) {
                        matches.push({
                            text: match[0],
                            index: match.index,
                            groups: match.slice(1)
                        });
                    }
                }

                if (matches.length === 0) {
                    resultDiv.innerHTML = '<span style="color: #dc2626;">未匹配到任何结果</span>';
                } else {
                    let html = `<div style="margin-bottom: 10px; color: #28a745;">✓ 找到 ${matches.length} 个匹配</div>`;
                    matches.forEach((m, i) => {
                        html += `<div style="margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 4px;">`;
                        html += `<div style="color: #333; font-weight: 500;">匹配 ${i + 1}: <span style="color: #0066cc;">${escapeHtml(m.text)}</span></div>`;
                        html += `<div style="color: #666; font-size: 13px; margin-top: 5px;">位置: ${m.index}</div>`;
                        if (m.groups.length > 0) {
                            html += `<div style="color: #666; font-size: 13px; margin-top: 5px;">捕获组: ${m.groups.map((g, gi) => `[${gi + 1}] ${escapeHtml(g || '(空)')}`).join(', ')}</div>`;
                        }
                        html += `</div>`;
                    });
                    
                    // 高亮显示匹配结果
                    let highlighted = input;
                    let offset = 0;
                    matches.forEach(m => {
                        const before = highlighted.substring(0, m.index + offset);
                        const after = highlighted.substring(m.index + m.text.length + offset);
                        const marked = `<mark style="background: #ffeb3b; padding: 2px 0;">${escapeHtml(m.text)}</mark>`;
                        highlighted = before + marked + after;
                        offset += marked.length - m.text.length;
                    });
                    
                    html += `<div style="margin-top: 15px; padding: 10px; background: #fff; border: 1px solid #e0e0e0; border-radius: 4px;"><div style="color: #666; font-size: 13px; margin-bottom: 5px;">高亮显示:</div>${highlighted}</div>`;
                    resultDiv.innerHTML = html;
                }
            } catch (e) {
                resultDiv.innerHTML = `<span style="color: #dc2626;">正则表达式错误: ${e.message}</span>`;
            }
        }

        function clearRegex() {
            document.getElementById('regex-pattern').value = '';
            document.getElementById('regex-input').value = '';
            document.getElementById('regex-result').innerHTML = '';
            document.getElementById('regex-global').checked = true;
            document.getElementById('regex-ignore-case').checked = false;
            document.getElementById('regex-multiline').checked = false;
            document.getElementById('regex-dotall').checked = false;
        }

        function setRegex(pattern) {
            document.getElementById('regex-pattern').value = pattern;
            testRegex();
        }
    </script>
